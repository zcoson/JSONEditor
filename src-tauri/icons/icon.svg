<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="64" fill="url(#bgGrad)"/>

  <!-- Document shape
  <path d="M120 70 L120 422 C120 440 135 455 153 455 L359 455 C377 455 392 440 392 422 L392 130 L330 70 Z"
        fill="#1e293b" stroke="#334155" stroke-width="3"/>-->

  <!-- Folded corner
  <path d="M330 70 L330 130 L392 130 Z" fill="#334155"/>-->

  <!-- Left brace -->
  <text x="50" y="350"
        font-family=""
        font-size="330"
        font-weight="bold"
        fill="url(#accentGrad)">{</text>

  <!-- Three dots inside braces -->
  <circle cx="190" cy="366" r="18" fill="#a855f7" opacity="0.9"/>
  <circle cx="256" cy="366" r="18" fill="#22d3ee" opacity="0.9"/>
  <circle cx="320" cy="366" r="18" fill="#f472b6" opacity="0.9"/>

  <!-- Right brace -->
  <text x="330" y="350"
        font-family="@@"
        font-size="330"
        font-weight="bold"
        fill="url(#accentGrad)">}</text>
</svg>